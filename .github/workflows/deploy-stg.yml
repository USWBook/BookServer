name: deploy-stg

on:
  push:
    branches:
      - develop
    paths:
      - '.github/workflows/**'
      - 'backend/src/**'
      - 'backend/build.gradle'
      - 'backend/settings.gradle'
      - 'backend/Dockerfile.stg'

jobs:
  buildImageAndPush:
    name: 도커 이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.export_owner.outputs.owner_lc }}
      image_name: ${{ steps.export_image.outputs.image_name }}

    steps:
      - uses: actions/checkout@v4

      - name: .env 파일 생성
        env:
          ENV: ${{ secrets.ENV }}
        run: echo "$ENV" > backend/.env

      - name: application-secret.yml 생성
        env:
          APPLICATION_SECRET: ${{ secrets.APPLICATION_SECRET }}
        run: echo "$APPLICATION_SECRET" > backend/src/main/resources/application-secret.yml

      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v2

      - name: 레지스트리 로그인
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 소유자 설정
        id: export_owner
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=$OWNER_LC" >> $GITHUB_OUTPUT

      - name: 이미지 이름 설정
        id: export_image
        run: echo "image_name=subook_backend_stg" >> $GITHUB_OUTPUT

      - name: 빌드 및 푸시 (Dockerfile.stg)
        uses: docker/build-push-action@v3
        with:
          context: backend
          file: backend/Dockerfile.stg
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:cache,mode=max
          tags: |
            ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:latest

  deploy:
    name: AWS SSM 배포
    needs: [buildImageAndPush]
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STG }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STG }}

      - name: EC2 인스턴스 ID 조회 (subook 전용)
        id: get_instance_id
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances --filters \
            "Name=tag:Name,Values=subook-stg-ec2-main" \
            "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo $INSTANCE_ID

      - name: AWS SSM Send-Command
        uses: peterkimzz/aws-ssm-send-command@master
        id: ssm
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STG }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STG }}
          instance-ids: ${{ env.INSTANCE_ID }}
          working-directory: /
          comment: Deploy
          command: |
            set -euo pipefail

            IMAGE="ghcr.io/${{ needs.buildImageAndPush.outputs.owner_lc }}/${{ needs.buildImageAndPush.outputs.image_name }}:latest"
            NETWORK="common"
            HEALTH_LIVE="/actuator/health/liveness"
            HEALTH_READY="/actuator/health/readiness"
            TIMEOUT_LIVE=90
            TIMEOUT_READY=300

            if docker ps --format '{{.Names}}' | grep -q "subookApp1_1"; then
              CURRENT="subookApp1_1"; NEXT="subookApp1_2"; CURRENT_PORT=8080; NEXT_PORT=8081
            else
              CURRENT="subookApp1_2"; NEXT="subookApp1_1"; CURRENT_PORT=8081; NEXT_PORT=8080
            fi

            echo "[1/5] Pull image"
            docker pull "$IMAGE"

            echo "[2/5] Start new container: $NEXT on :$NEXT_PORT"
            docker stop "$NEXT" 2>/dev/null || true
            docker rm "$NEXT" 2>/dev/null || true
            docker run -d \
              --name "$NEXT" \
              --restart unless-stopped \
              --network $NETWORK \
              -p "$NEXT_PORT":8080 \
              -e SPRING_PROFILES_ACTIVE=secret,stg \
              -e TZ=Asia/Seoul \
              "$IMAGE"

            wait_for () {
              local port="$1" url="$2" timeout="$3"
              local start=$(date +%s)
              while true; do
                if curl -fsS "http://localhost:${port}${url}" >/dev/null; then
                  return 0
                fi
                local elapsed=$(( $(date +%s) - start ))
                if [ $elapsed -ge $timeout ]; then
                  return 1
                fi
                echo "⏳ waiting ${url} on :${port} ... (${elapsed}s)"
                sleep 3
              done
            }

            echo "[3/5] Wait liveness"
            if ! wait_for "$NEXT_PORT" "$HEALTH_LIVE" "$TIMEOUT_LIVE"; then
              echo "❌ Liveness failed within ${TIMEOUT_LIVE}s. Logs:"
              docker logs --tail=200 "$NEXT" || true
              docker stop "$NEXT" || true
              docker rm "$NEXT" || true
              exit 1
            fi
            echo "✅ Liveness UP"

            echo "[4/5] Wait readiness"
            if ! wait_for "$NEXT_PORT" "$HEALTH_READY" "$TIMEOUT_READY"; then
              echo "❌ Readiness failed within ${TIMEOUT_READY}s. Logs:"
              docker logs --tail=200 "$NEXT" || true
              docker stop "$NEXT" || true
              docker rm "$NEXT" || true
              exit 1
            fi
            echo "✅ Readiness UP"

            echo "[5/5] Switch traffic: stop old $CURRENT"
            docker stop "$CURRENT" 2>/dev/null || true
            docker rm "$CURRENT" 2>/dev/null || true

            docker rmi $(docker images -f "dangling=true" -q) 2>/dev/null || true
            echo "✅ Deployment complete. Running container: $NEXT on port $NEXT_PORT"
