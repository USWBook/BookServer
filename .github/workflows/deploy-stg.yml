name: deploy-stg

on:
  push:
    branches:
      - develop
    paths:
      - '.github/workflows/**'
      - 'backend/src/**'
      - 'backend/build.gradle'
      - 'backend/settings.gradle'
      - 'backend/Dockerfile.stg'
  workflow_dispatch: {}

# GHCR 푸시 권한 필요
permissions:
  contents: read
  packages: write

# (선택) 동시에 2개 이상 배포 막기
concurrency:
  group: deploy-stg
  cancel-in-progress: false

jobs:
  buildImageAndPush:
    name: 도커 이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.export_owner.outputs.owner_lc }}
      image_name: ${{ steps.export_image.outputs.image_name }}

    steps:
      - uses: actions/checkout@v4

      - name: .env 파일 생성
        env:
          ENV: ${{ secrets.ENV }}
        run: echo "$ENV" > backend/.env

      - name: application-secret.yml 생성
        env:
          APPLICATION_SECRET: ${{ secrets.APPLICATION_SECRET }}
        run: echo "$APPLICATION_SECRET" > backend/src/main/resources/application-secret.yml

      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v2

      - name: 레지스트리 로그인 (빌드용)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 조직 소유 레포면 이 값이 자동으로 '조직명'이 됩니다.
      # 혹시 개인 레포라면 echo "owner_lc=조직명소문자" 로 고정하세요.
      - name: 소유자 설정
        id: export_owner
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

      - name: 이미지 이름 설정
        id: export_image
        run: echo "image_name=subook_backend_stg" >> "$GITHUB_OUTPUT"

      - name: 빌드 및 푸시 (Dockerfile.stg)
        uses: docker/build-push-action@v3
        with:
          context: backend
          file: backend/Dockerfile.stg
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:cache,mode=max
          tags: |
            ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:latest

  deploy:
    name: AWS SSM 배포
    needs: [buildImageAndPush]
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STG }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STG }}

      - name: EC2 인스턴스 ID 조회 (subook 전용)
        id: get_instance_id
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances --filters \
            "Name=tag:Name,Values=subook-stg-ec2-main" \
            "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -z "$INSTANCE_ID" ]; then
            echo "❌ No running instance found for subook-stg-ec2-main"
            exit 1
          fi
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Target INSTANCE_ID: $INSTANCE_ID"

      - name: AWS SSM Send-Command
        uses: peterkimzz/aws-ssm-send-command@master
        id: ssm
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STG }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STG }}
          instance-ids: ${{ env.INSTANCE_ID }}
          working-directory: /
          comment: Deploy
          command: |
            set -euo pipefail

            IMAGE="ghcr.io/${{ needs.buildImageAndPush.outputs.owner_lc }}/${{ needs.buildImageAndPush.outputs.image_name }}:latest"
            NETWORK="common"
            HEALTH_LIVE="/actuator/health/liveness"
            HEALTH_READY="/actuator/health/readiness"
            TIMEOUT_LIVE=90
            TIMEOUT_READY=300

            echo "[0/7] Prepare docker network"
            docker network create "$NETWORK" >/dev/null 2>&1 || true

            echo "[1/7] GHCR login via SSM Parameter Store"
            GHCR_USER=$(aws ssm get-parameter --region ${{ secrets.AWS_REGION }} --name "/subook/ghcr/user"  --query 'Parameter.Value' --output text)
            GHCR_TOKEN=$(aws ssm get-parameter --region ${{ secrets.AWS_REGION }} --with-decryption --name "/subook/ghcr/token" --query 'Parameter.Value' --output text)
            if [ -z "${GHCR_USER}" ] || [ -z "${GHCR_TOKEN}" ]; then
              echo "❌ Missing GHCR credentials in SSM Parameter Store (/subook/ghcr/user, /subook/ghcr/token)"
              exit 1
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "[2/7] Pull image: $IMAGE"
            docker pull "$IMAGE"

            echo "[2.5/7] Decide CURRENT/NEXT by RUNNING containers"
            RUNNING=$(docker ps --format '{{.Names}}' | grep -E '^subookApp1_[12]$' || true)
            if [ "$RUNNING" = "subookApp1_1" ]; then
              CURRENT="subookApp1_1"; CURRENT_PORT=8080
              NEXT="subookApp1_2";   NEXT_PORT=8081
            elif [ "$RUNNING" = "subookApp1_2" ]; then
              CURRENT="subookApp1_2"; CURRENT_PORT=8081
              NEXT="subookApp1_1";   NEXT_PORT=8080
            else
              CURRENT=""; CURRENT_PORT=""
              NEXT="subookApp1_1"; NEXT_PORT=8080
            fi
            echo "CURRENT=${CURRENT:-none}, NEXT=$NEXT (ports: CURRENT=${CURRENT_PORT:-na}, NEXT=$NEXT_PORT)"

            echo "[3/7] Clean old NEXT if exists (Exited or leftover)"
            docker stop "$NEXT" 2>/dev/null || true
            docker rm "$NEXT" 2>/dev/null || true

            echo "[4/7] Start NEXT: $NEXT on :$NEXT_PORT"
            docker run -d \
              --name "$NEXT" \
              --restart unless-stopped \
              --network "$NETWORK" \
              -p "$NEXT_PORT":8080 \
              -e SPRING_PROFILES_ACTIVE=secret,stg \
              -e TZ=Asia/Seoul \
              "$IMAGE"

            wait_for () {
              local port="$1" url="$2" timeout="$3"
              local start
              start=$(date +%s)
              while true; do
                if curl -fsS "http://localhost:${port}${url}" >/dev/null; then
                  return 0
                fi
                local elapsed=$(( $(date +%s) - start ))
                if [ $elapsed -ge $timeout ]; then
                  return 1
                fi
                echo "⏳ waiting ${url} on :${port} ... (${elapsed}s)"
                sleep 3
              done
            }

            echo "[5/7] Wait liveness"
            if ! wait_for "$NEXT_PORT" "$HEALTH_LIVE" "$TIMEOUT_LIVE"; then
              echo "❌ Liveness failed within ${TIMEOUT_LIVE}s. Logs:"
              docker logs --tail=200 "$NEXT" || true
              docker stop "$NEXT" || true
              docker rm "$NEXT" || true
              exit 1
            fi
            echo "✅ Liveness UP"

            echo "[6/7] Wait readiness"
            if ! wait_for "$NEXT_PORT" "$HEALTH_READY" "$TIMEOUT_READY"; then
              echo "❌ Readiness failed within ${TIMEOUT_READY}s. Logs:"
              docker logs --tail=200 "$NEXT" || true
              docker stop "$NEXT" || true
              docker rm "$NEXT" || true
              exit 1
            fi
            echo "✅ Readiness UP"

            # --- HAProxy cfg for api.stg.subook.shop (idempotent) ---
            echo "[6.5/7] Ensure HAProxy config for api.stg.subook.shop"
            mkdir -p /dockerProjects/ha_proxy_1/volumes/usr/local/etc/haproxy

            cat >/dockerProjects/ha_proxy_1/volumes/usr/local/etc/haproxy/haproxy.cfg <<'EOC'
            global
              log stdout format raw local0

            resolvers docker
              nameserver dns1 127.0.0.11:53
              resolve_retries 3
              timeout retry 1s
              hold valid 10s

            defaults
              mode http
              timeout connect 5s
              timeout client  60s
              timeout server  60s

            frontend http_front
              bind *:80
              # 오직 API 서브도메인만 백엔드로 라우팅
              acl host_api hdr(host) -i api.stg.subook.shop
              http-request set-header X-Forwarded-Proto https
              # ⚠️ CORS 헤더를 명시적으로 추가합니다. ⚠️
              http-response add-header Access-Control-Allow-Origin "https://stg.subook.shop"
              http-response add-header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
              http-response add-header Access-Control-Allow-Headers "Origin, Content-Type, Authorization, Accept"
              http-response add-header Access-Control-Expose-Headers "Authorization, Content-Disposition"
              http-response add-header Access-Control-Allow-Credentials "true"
              
              use_backend api_back if host_api
              default_backend not_found

            backend api_back
              balance roundrobin
              option httpchk GET /actuator/health
              default-server inter 4s rise 3 fall 3 init-addr last,libc,none resolvers docker
              option redispatch
              server subook_server_1 subookApp1_1:8080 check
              server subook_server_2 subookApp1_2:8080 check

            backend not_found
              http-request deny deny_status 404
            EOC

            docker rm -f ha_proxy_1 2>/dev/null || true
            docker run -d \
              --name ha_proxy_1 \
              --restart unless-stopped \
              --network common \
              -p 8090:80 \
              -v /dockerProjects/ha_proxy_1/volumes/usr/local/etc/haproxy:/usr/local/etc/haproxy \
              haproxy
            # --- /HAProxy cfg ---

            echo "[7/7] Switch: stop old CURRENT (if any)"
            if [ -n "${CURRENT}" ]; then
              docker stop "$CURRENT" 2>/dev/null || true
              docker rm "$CURRENT" 2>/dev/null || true
            fi

            docker rmi $(docker images -f "dangling=true" -q) 2>/dev/null || true
            echo "✅ Deployment complete. Running container: $NEXT on port $NEXT_PORT"
