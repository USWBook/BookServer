spring:
  datasource:
    url: jdbc:mysql://mysql_1:3306/subook_stg?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: subook_stg_user
    password: ${custom.stg.db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: redis_1
      port: 6379
      password: ${custom.stg.redis.password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
custom:
  site:
    domain: stg.subook.shop
    backUrl: https://stg.subook.shop
    frontUrl: https://stg.subook.shop

# CORS 허용 오리진
cors:
  allowed-origins:
    - "https://stg.subook.shop"
  allowed-origin-patterns:
    - "https://*.vercel.app"