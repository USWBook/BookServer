# 운영 서버와 똑같이 운영되는 스테이징 서버 (테스트 서버) 설정
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/book?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: stg_user
    password: stg_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

custom:
  site:
    domain: sulee.site
    backUrl: https://api.sulee.site
    frontUrl: https://www.sulee.site
