spring:
  application:
    name: book

  profiles:
    include: secret
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false

  output:
    ansi:
      enabled: always

server:
  port: 8080

jwt:
  access-expiration: 3600
  refresh-expiration: 604800

logging:
  output:
    ansi:
      enabled: always
