spring:
  application:
    name: book
  profiles:
    active: dev
    include: secret
  output:
    ansi:
      enabled: always
  data:
    redis:
      host: localhost   # Redis 서버 주소 (도커로 띄웠으면 localhost)
      port: 6379        # Redis 서버 포트 (기본 6379)

server:
  port: 8080

logging:
  output:
    ansi:
      enabled: always