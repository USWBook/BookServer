#application.yml
spring:
  application:
    name: book

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false
  profiles:
    include: secret
    active: dev


  output:
    ansi:
      enabled: always


server:
  port: 8080



logging:
  output:
    ansi:
      enabled: always

jwt:
  # ⛔️ 실제 키가 아닌, AWS Secrets Manager에 저장된 시크릿의 이름 또는 ARN
  secret-name: "book-server/jwt-secret"